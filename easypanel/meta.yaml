name: RAG Knowledge Base
description: |
  RAG Knowledge Base é uma plataforma completa de Retrieval-Augmented Generation
  para gerenciar bases de conhecimento com documentos e busca semântica. O sistema
  permite upload de múltiplos tipos de arquivos (PDF, Excel, imagens, TXT), processa
  automaticamente o conteúdo extraindo texto e gerando embeddings semânticos com
  OpenAI, armazena arquivos no MinIO e oferece busca inteligente por similaridade
  vetorial usando PostgreSQL com pgvector.

  Funcionalidades principais incluem autenticação JWT, upload com drag-and-drop,
  processamento automático de documentos com OCR, chunking inteligente, geração de
  embeddings, dashboard de documentos, edição de metadados com tags personalizadas,
  geração automática de tags com IA, e busca semântica com resultados ranqueados.

instructions: |
  1. Configure as variáveis de ambiente obrigatórias: OPENAI_API_KEY
  2. O banco PostgreSQL com pgvector será criado automaticamente
  3. O MinIO será configurado automaticamente para armazenamento de arquivos
  4. As migrações do banco serão executadas automaticamente na inicialização
  5. Acesse a aplicação e crie uma conta ou faça login
  6. Comece fazendo upload de documentos na página "Upload de Documentos"
  7. Os documentos serão processados automaticamente e ficarão disponíveis para busca semântica

changelog:
