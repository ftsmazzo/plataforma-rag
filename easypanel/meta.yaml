links:
  - label: GitHub
    url: https://github.com/easypanel-io/templates
  - label: OpenAI API
    url: https://platform.openai.com/docs/api-reference

contributors:
  - name: RAG Knowledge Base Team
    url: https://github.com/ftsmazzo/sistema-rag

schema:
  type: object
  required:
    - appServiceName
    - appServiceImage
    - databaseServiceName
  properties:
    appServiceName:
      type: string
      title: App Service Name
      default: rag-knowledge-base
    appServiceImage:
      type: string
      title: App Docker Image
      default: rag-knowledge-base:latest
    databaseServiceName:
      type: string
      title: Database Service Name
      default: rag-postgres
    minioAccessKey:
      type: string
      title: MinIO Access Key
      default: minioadmin
    minioSecretKey:
      type: string
      title: MinIO Secret Key
      description: Leave empty to generate automatically
    openaiApiKey:
      type: string
      title: OpenAI API Key
      description: Your OpenAI API key for generating embeddings

benefits:
  - title: Busca Semântica Inteligente
    description: |
      Encontre informações relevantes usando busca por similaridade vetorial
      com embeddings OpenAI, não apenas palavras-chave.
  - title: Processamento Automático
    description: |
      Upload de PDFs, planilhas, imagens e textos com extração automática
      de conteúdo, OCR e chunking inteligente.
  - title: Geração de Tags com IA
    description: |
      Tags relevantes geradas automaticamente usando LLM para organizar
      e categorizar documentos de forma inteligente.
  - title: Isolamento de Dados
    description: |
      Cada usuário tem sua própria base de conhecimento isolada com
      autenticação segura via OAuth.

features:
  - title: Upload Multi-formato
    description: |
      Suporte para PDF, Excel, CSV, imagens (PNG/JPG) e arquivos de texto
      com interface drag-and-drop intuitiva.
  - title: Dashboard Completo
    description: |
      Visualize todos os documentos processados, status, metadados, chunks
      e estatísticas de uso em tempo real.
  - title: Edição de Metadados
    description: |
      Adicione tags personalizadas e descrições aos documentos para melhor
      organização e busca.
  - title: API de Busca RAG
    description: |
      Endpoint de busca semântica que retorna chunks relevantes ranqueados
      por score de similaridade para integração com LLMs.
